name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    # The unit tests are pure logic (pattern detection, time parsing, mode
    # resolution, reap state machine) and don't spawn psmux, so they run anywhere.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test test/*.test.js
